<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">

    <header class="hero">
        <div class="hero-content">
            <h1>Assessment Quiz</h1>
            <p>This quiz will test your understanding with score tracking.</p>
        </div>
    </header>

    <section class="quiz-section">
        <div class="container">
            <h2>Assessment Quiz</h2>
            <form id="assessmentForm">
                <div id="quizContainer">
                    <!-- Questions will be dynamically inserted here -->
                </div>

                <div class="quiz-actions">
                    <button type="submit" class="btn">Submit Quiz</button>
                    <button type="button" id="resetQuiz" class="btn btn-secondary">Reset</button>
                </div>

                <div id="quizResult" class="quiz-result" aria-live="polite"></div>
            </form>
        </div>
    </section>
